rules:

  # -----------------------------------------------------
  # Rule 1: Validate Transaction ID
  # -----------------------------------------------------

  - name: "TXN - Validate Transaction ID"
    description: "Transaction ID must not be null"

    priority: 1

    condition: >
      tranId == null ||
      tranId.trim().isEmpty()

    actions:
      - "throw new RuntimeException('Transaction ID is required')"



  # -----------------------------------------------------
  # Rule 2: Validate Currency
  # -----------------------------------------------------

  - name: "TXN - Validate Currency"
    description: "Only INR and USD are allowed"

    priority: 2

    condition: >
      !tranCurr.equals('INR') &&
      !tranCurr.equals('USD')

    actions:
      - "dto.setErrCd('INVALID_CURRENCY')"
      - "dto.setCurStatus('REJECTED')"



  # -----------------------------------------------------
  # Rule 3: High Amount Review
  # -----------------------------------------------------

  - name: "TXN - High Amount Review"
    description: "Flag transactions above 5000"

    priority: 3

    condition: >
      tranAmt != null &&
      Integer.parseInt(tranAmt) > 5000

    actions:
      - "dto.setCurStatus('REVIEW')"
      - "System.out.println('High value transaction detected')"



  # -----------------------------------------------------
  # Rule 4: DUAL Message Requires Clearing
  # -----------------------------------------------------

  - name: "TXN - Require Clearing for DUAL"
    description: "DUAL message must include clearing settlement"

    priority: 4

    condition: >
      msgType != null &&
      msgType.equalsIgnoreCase('DUAL') &&
      clearingSettlement == null

    actions:
      - "throw new RuntimeException('Clearing settlement required for DUAL message')"



  # -----------------------------------------------------
  # Rule 5: Sender and Recipient Validation
  # -----------------------------------------------------

  - name: "TXN - Sender Recipient Same"
    description: "Sender and recipient cannot be same"

    priority: 5

    condition: >
      senderRecipient != null &&
      senderRecipient.senderName != null &&
      senderRecipient.senderName.equals(senderRecipient.recipientName)

    actions:
      - "throw new RuntimeException('Sender and Recipient cannot be same')"



  # -----------------------------------------------------
  # Rule 6: Address Validation
  # -----------------------------------------------------

  - name: "TXN - Address Required"
    description: "At least one address must exist"

    priority: 6

    condition: >
      addresses == null ||
      addresses.isEmpty()

    actions:
      - "throw new RuntimeException('Address is required')"



  # -----------------------------------------------------
  # Rule 7: Default Outbox Status
  # -----------------------------------------------------

  - name: "OUTBOX - Default Status"
    description: "Set default status if missing"

    priority: 7

    condition: >
      outbox.status == null

    actions:
      - "outbox.setStatus('PENDING')"



  # -----------------------------------------------------
  # Rule 8: Kafka Retry Rule
  # -----------------------------------------------------

  - name: "OUTBOX - Retry Failed"
    description: "Retry failed messages"

    priority: 8

    condition: >
      outbox.status != null &&
      outbox.status.equals('FAILED')

    actions:
      - "outbox.setStatus('PENDING')"
      - "System.out.println('Retrying failed message')"


 # -----------------------------------------------------
 # Rule 9: Clearing Must Have Settlement
 # -----------------------------------------------------

  - name: "CLEARING - Settlement Required"
    description: "Clearing transaction must include settlement"

    priority: 9

    condition: >
      tranType != null &&
      tranType.equalsIgnoreCase('CLEARING') &&
      clearingSettlement == null

    actions:
      - "throw new RuntimeException('Clearing settlement is required for CLEARING transaction')"
